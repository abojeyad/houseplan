<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Mockup v5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'IBM Plex Sans Arabic',sans-serif;background:#ddd8d0;display:flex;flex-direction:column;overflow:hidden}
#toolbar{
  background:#1a1a1a;color:#e8e0d0;display:flex;align-items:center;gap:0;
  height:50px;padding:0 18px;flex-shrink:0;border-bottom:1px solid #2e2e2e;user-select:none;flex-wrap:wrap;
}
#toolbar .t-title{font-size:12.5px;font-weight:500;letter-spacing:.04em;flex:1}
.t-sep{width:1px;height:28px;background:#2e2e2e;margin:0 14px}
.t-group{display:flex;align-items:center;gap:6px}
.t-label{font-size:10px;color:#777}
.layer-btn{background:transparent;border:1px solid #333;color:#777;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'IBM Plex Sans Arabic',sans-serif;transition:.15s;}
.layer-btn.on{border-color:#555;color:#bbb;background:#252525}
#canvas{
  flex:1;overflow:hidden;position:relative;cursor:grab;
  background:#ddd8d0;
  background-image:radial-gradient(circle,#bbb8b0 1px,transparent 1px);
  background-size:20px 20px;
}
#canvas.dragging{cursor:grabbing}
#main-svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:transparent;
}
.th{font-family:'IBM Plex Sans Arabic',Arial,sans-serif;font-size:13px;font-weight:700}
.ts{font-family:'IBM Plex Sans Arabic',Arial,sans-serif;font-size:10px}
.tn{font-family:'IBM Plex Sans Arabic',Arial,sans-serif;font-size:9px;font-weight:500}
.twl{font-family:'IBM Plex Sans Arabic',Arial,sans-serif;font-size:7px;fill:#b04000}
#reset-btn{
  position:absolute;bottom:16px;left:16px;
  background:#1a1a1a;color:#e8e0d0;border:none;
  padding:6px 14px;border-radius:4px;cursor:pointer;
  font-size:11px;font-family:'IBM Plex Sans Arabic',sans-serif;
  opacity:0.7;transition:.2s;z-index:10;
}
#reset-btn:hover{opacity:1}
</style>
</head>
<body>

<div id="toolbar">
  <div class="t-title">موكاب الكتل — وحدتان 8m × 21m</div>
  <div class="t-sep"></div>
  <div class="t-group">
    <span class="t-label">طبقات</span>
    <button class="layer-btn"     id="lb-fills"        onclick="toggleLayer('fills')">التعبئة</button>
    <button class="layer-btn on"  id="lb-walls"        onclick="toggleLayer('walls')">الجدران</button>
    <button class="layer-btn"     id="lb-wlabels"      onclick="toggleLayer('wlabels')">أسماء الجدران</button>
    <button class="layer-btn"     id="lb-letters"      onclick="toggleLayer('letters')">الأحرف</button>
    <button class="layer-btn on"  id="lb-names"        onclick="toggleLayer('names')">المسميات</button>
    <button class="layer-btn"     id="lb-innerdims"    onclick="toggleLayer('innerdims')">أبعاد داخلية</button>
    <button class="layer-btn on"  id="lb-doors"        onclick="toggleLayer('doors')">الأبواب</button>
    <button class="layer-btn"     id="lb-doorlabels"   onclick="toggleLayer('doorlabels')">مقاسات الأبواب</button>
    <button class="layer-btn on"  id="lb-windows"      onclick="toggleLayer('windows')">النوافذ</button>
    <button class="layer-btn"     id="lb-windowlabels" onclick="toggleLayer('windowlabels')">مقاسات النوافذ</button>
  </div>
</div>

<div id="canvas">
  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 980"></svg>
</div>
<button id="reset-btn" onclick="resetView()">⟳ إعادة الضبط</button>

const svgEl = document.getElementById('main-svg');

/** إنشاء عنصر SVG بخصائص وإلحاقه بالوالد */
function el(tag, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

/** إنشاء مجموعة SVG بمعرف */
function group(id, parent) {
  return el('g', { id }, parent);
}

/**
 * رسم خط كوتة (بُعد) مع علامتَي نهايتيه ونصه
 * @param {number} x1,y1,x2,y2 — نقطتا الخط
 * @param {string} txt         — النص
 * @param {number} ox,oy       — موضع النص
 * @param {string} tanchor     — محاذاة النص
 * @param {number} rot         — زاوية دوران (0 = بدون دوران)
 * @param {number} rx,ry       — مركز الدوران
 */
function dimLine(x1, y1, x2, y2, txt, ox, oy, tanchor, rot, rx, ry) {
  el('line', { x1, y1, x2, y2, stroke:DIM.stroke, 'stroke-width':0.8 }, gStatic);
  if (x1 === x2) { // رأسي
    el('line', { x1:x1-DIM.tick/2, y1, x2:x1+DIM.tick/2, y2:y1, stroke:DIM.stroke, 'stroke-width':0.8 }, gStatic);
    el('line', { x1:x2-DIM.tick/2, y1:y2, x2:x2+DIM.tick/2, y2, stroke:DIM.stroke, 'stroke-width':0.8 }, gStatic);
  } else { // أفقي
    el('line', { x1, y1:y1-DIM.tick/2, x2:x1, y2:y1+DIM.tick/2, stroke:DIM.stroke, 'stroke-width':0.8 }, gStatic);
    el('line', { x1:x2, y1:y2-DIM.tick/2, x2, y2:y2+DIM.tick/2, stroke:DIM.stroke, 'stroke-width':0.8 }, gStatic);
  }
  const t = el('text', { x:ox, y:oy, 'text-anchor':tanchor, fill:DIM.stroke, 'font-size':DIM.fs, 'font-weight':DIM.fw, 'font-family':'IBM Plex Sans Arabic,sans-serif' }, gStatic);
  if (rot) t.setAttribute('transform', `rotate(${rot},${rx},${ry})`);
  t.textContent = txt;
}

/**
 * رسم باب (طمس خط الجدار + عتبتان)
 * يُكتب تسمية الباب في طبقة gDoorLabels منفصلة
 */
function drawDoor(d) {
  if (d.axis === 'H') {
    el('line', { x1:d.x1, y1:d.y,       x2:d.x2, y2:d.y,       stroke:DOOR.gapColor,  'stroke-width':DOOR.gapWidth }, gDoors);
    el('line', { x1:d.x1, y1:d.y-DOOR.jambLen, x2:d.x1, y2:d.y+DOOR.jambLen, stroke:DOOR.jambColor, 'stroke-width':DOOR.jamb }, gDoors);
    el('line', { x1:d.x2, y1:d.y-DOOR.jambLen, x2:d.x2, y2:d.y+DOOR.jambLen, stroke:DOOR.jambColor, 'stroke-width':DOOR.jamb }, gDoors);
    const mx = (d.x1 + d.x2) / 2;
    const ty = d.inward === 'N' ? d.y + 12 : d.y - 5;
    el('text', { class:'ts', x:mx, y:ty, 'text-anchor':'middle', fill:'#1a6b8a', 'font-weight':600 }, gDoorLabels).textContent = d.label;
  } else {
    el('line', { x1:d.x, y1:d.y1, x2:d.x, y2:d.y2, stroke:DOOR.gapColor,  'stroke-width':DOOR.gapWidth }, gDoors);
    el('line', { x1:d.x-DOOR.jambLen, y1:d.y1, x2:d.x+DOOR.jambLen, y2:d.y1, stroke:DOOR.jambColor, 'stroke-width':DOOR.jamb }, gDoors);
    el('line', { x1:d.x-DOOR.jambLen, y1:d.y2, x2:d.x+DOOR.jambLen, y2:d.y2, stroke:DOOR.jambColor, 'stroke-width':DOOR.jamb }, gDoors);
    const my = (d.y1 + d.y2) / 2;
    const tx     = d.inward === 'E' ? d.x + 6 : d.x - 6;
    const anchor = d.inward === 'E' ? 'start'  : 'end';
    el('text', { class:'ts', x:tx, y:my+4, 'text-anchor':anchor, fill:'#1a6b8a', 'font-weight':600 }, gDoorLabels).textContent = d.label;
  }
}

/**
 * رسم نافذة (طمس خط الجدار بلون مختلف + عتبتان)
 * يُكتب المقاس في طبقة gWindowLabels منفصلة
 */
function drawWindow(w) {
  if (w.axis === 'H') {
    el('line', { x1:w.x1, y1:w.y, x2:w.x2, y2:w.y, stroke:WIN.gapColor, 'stroke-width':WIN.gapWidth }, gWindows);
    el('line', { x1:w.x1, y1:w.y-WIN.jambLen, x2:w.x1, y2:w.y+WIN.jambLen, stroke:WIN.jambColor, 'stroke-width':WIN.jamb }, gWindows);
    el('line', { x1:w.x2, y1:w.y-WIN.jambLen, x2:w.x2, y2:w.y+WIN.jambLen, stroke:WIN.jambColor, 'stroke-width':WIN.jamb }, gWindows);
    const wm  = ((w.x2 - w.x1) / SCALE).toFixed(2).replace(/\.?0+$/, '') + 'm';
    const mx  = (w.x1 + w.x2) / 2;
    const ty  = w.y === 60 ? w.y - 4 : w.y + 12;
    el('text', { class:'ts', x:mx, y:ty, 'text-anchor':'middle', fill:'#1a6b8a', 'font-weight':600 }, gWindowLabels).textContent = wm;
  } else {
    el('line', { x1:w.x, y1:w.y1, x2:w.x, y2:w.y2, stroke:WIN.gapColor, 'stroke-width':WIN.gapWidth }, gWindows);
    el('line', { x1:w.x-WIN.jambLen, y1:w.y1, x2:w.x+WIN.jambLen, y2:w.y1, stroke:WIN.jambColor, 'stroke-width':WIN.jamb }, gWindows);
    el('line', { x1:w.x-WIN.jambLen, y1:w.y2, x2:w.x+WIN.jambLen, y2:w.y2, stroke:WIN.jambColor, 'stroke-width':WIN.jamb }, gWindows);
    const wm     = ((w.y2 - w.y1) / SCALE).toFixed(2).replace(/\.?0+$/, '') + 'm';
    const my     = (w.y1 + w.y2) / 2;
    const tx     = w.x === 90 ? w.x - 6 : w.x + 6;
    const anchor = w.x === 90 ? 'end' : 'start';
    el('text', { class:'ts', x:tx, y:my+4, 'text-anchor':anchor, fill:'#1a6b8a', 'font-weight':600 }, gWindowLabels).textContent = wm;
  }
}

  innerdims:    { on:false, el: gInnerdims,     btn: document.getElementById('lb-innerdims')    },
  doors:        { on:true,  el: gDoors,         btn: document.getElementById('lb-doors')        },
  doorlabels:   { on:false, el: gDoorLabels,    btn: document.getElementById('lb-doorlabels')   },
  windows:      { on:true,  el: gWindows,       btn: document.getElementById('lb-windows')      },
  windowlabels: { on:false, el: gWindowLabels,  btn: document.getElementById('lb-windowlabels') },
};

function toggleLayer(name) {
  const L = LAYERS[name];
  L.on = !L.on;
  L.el.setAttribute('display', L.on ? '' : 'none');
  L.btn.classList.toggle('on', L.on);
}

// ══════════════════════════════════════════════════════════
// Zoom & Pan — viewBox based (حاد عند أي مستوى تكبير)
// ══════════════════════════════════════════════════════════

const canvas  = document.getElementById('canvas');
const mainSvg = document.getElementById('main-svg');

const CONTENT = { x:0, y:0, w:640, h:980 }; // أبعاد المحتوى الكاملة
const PAD     = 40;                           // هامش عند الضبط التلقائي
const MIN_VW  = 80;
const MAX_VW  = 3000;

let vx = 0, vy = 0, vw = CONTENT.w, vh = CONTENT.h;

function setViewBox(x, y, w) {
  vw = Math.min(Math.max(w, MIN_VW), MAX_VW);
  vh = vw * (CONTENT.h / CONTENT.w);
  vx = x;
  vy = y;
  mainSvg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
}

function fitToScreen() {
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const s  = Math.min((cw - PAD*2) / CONTENT.w, (ch - PAD*2) / CONTENT.h);
  const fw = CONTENT.w / s;
  const fx = CONTENT.x - (fw - CONTENT.w) / 2;
  const fy = CONTENT.y - (fw * CONTENT.h / CONTENT.w - CONTENT.h) / 2;
  setViewBox(fx, fy, fw);
}

function resetView() { fitToScreen(); }

/** تحويل إحداثيات الشاشة إلى إحداثيات SVG viewBox */
function screenToSVG(sx, sy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: vx + ((sx - rect.left)  / rect.width)  * vw,
    y: vy + ((sy - rect.top)   / rect.height) * vh,
  };
}

// ── Wheel Zoom (نحو موضع الماوس) ──
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 0.88 : 1/0.88;
  const pt     = screenToSVG(e.clientX, e.clientY);
  const newW   = vw * factor;
  setViewBox(
    pt.x - (pt.x - vx) * (newW / vw),
    pt.y - (pt.y - vy) * (newW / vw),
    newW
  );
}, { passive: false });

// ── Mouse Drag ──
let dragging = false, dragStart = null, dragVB = null;

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging  = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragVB    = { x: vx, y: vy };
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  setViewBox(
    dragVB.x - (e.clientX - dragStart.x) / rect.width  * vw,
    dragVB.y - (e.clientY - dragStart.y) / rect.height * vh,
    vw
  );
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});

// ── Touch (سحب + ضغطتان للتكبير) ──
let t1 = null, t2 = null, tVB = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  tVB = { x: vx, y: vy, w: vw };
  if (e.touches.length === 1) {
    t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    t2 = null;
  } else if (e.touches.length === 2) {
    t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    t2 = { x: e.touches[1].clientX, y: e.touches[1].clientY };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  if (e.touches.length === 1 && t1 && !t2) {
    setViewBox(
      tVB.x - (e.touches[0].clientX - t1.x) / rect.width  * vw,
      tVB.y - (e.touches[0].clientY - t1.y) / rect.height * vh,
      vw
    );
  } else if (e.touches.length === 2 && t1 && t2) {
    const oldDist = Math.hypot(t2.x - t1.x, t2.y - t1.y);
    const newDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    const factor  = oldDist / newDist;
    const cx      = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy      = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const pt      = screenToSVG(cx, cy);
    const newW    = tVB.w * factor;
    setViewBox(
      pt.x - (pt.x - tVB.x) * (newW / tVB.w),
      pt.y - (pt.y - tVB.y) * (newW / tVB.w),
      newW
    );
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) { t1 = null; t2 = null; }
});

// ── Resize مع debounce ──
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(fitToScreen, 100);
});

fitToScreen();
</script>
